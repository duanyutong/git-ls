name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Cargo state
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt

      - name: Install validation tools
        uses: taiki-e/install-action@v2
        with:
          tool: |
            cargo-deny@0.19.8
            cargo-machete@0.9.2
            cargo-sort@2.1.4
            just@1.51.0
            prek@0.4.3
            typos-cli@1.46.3

      - name: Check
        run: just check

      - name: Verify pushed versions
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        # The all-zero object ID asks xtask to verify from the latest reachable v* tag.
        run: cargo run --locked -p xtask -- version verify-range "0000000000000000000000000000000000000000" "${{ github.sha }}"
