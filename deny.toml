[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "GPL-3.0-only",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
skip = [
    { name = "hashbrown", version = "0.16.1" },
    { name = "wit-bindgen", version = "0.46.0" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
