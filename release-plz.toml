[workspace]
# This project is currently released from Git tags and GitHub releases.
# Remove `git_only` when the crate is ready to be published to crates.io.
git_only = true

# Open a release PR first; create the tag and GitHub release only after that PR is merged.
release_always = false

# Keep strict Conventional Commit semantics: feature commits increment the
# minor version even while the crate is still 0.x.
features_always_increment_minor = true

# Avoid unrelated dependency churn in release PRs.
dependencies_update = false
